name: CI - Build & Push Docker image to Amazon ECR

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image (SHA + latest)
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO: ${{ secrets.ECR_REPO }}
        run: |
          set -euo pipefail

          # Sanity checks (fails fast if a secret is empty)
          if [ -z "${REGISTRY}" ] || [ -z "${REPO}" ]; then
            echo "ERROR: REGISTRY or ECR_REPO is empty. Check your GitHub Secrets."
            exit 1
          fi

          IMAGE_SHA="${REGISTRY}/${REPO}:${GITHUB_SHA}"
          IMAGE_LATEST="${REGISTRY}/${REPO}:latest"

          echo "Building: ${IMAGE_SHA}"
          docker build -t "${IMAGE_SHA}" .

          echo "Pushing: ${IMAGE_SHA}"
          docker push "${IMAGE_SHA}"

          echo "Tagging and pushing: ${IMAGE_LATEST}"
          docker tag "${IMAGE_SHA}" "${IMAGE_LATEST}"
          docker push "${IMAGE_LATEST}"