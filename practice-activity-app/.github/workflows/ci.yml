name: CI - Build & Push Docker image to Amazon ECR

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image (SHA + latest)
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO: ${{ secrets.ECR_REPO }}
        run: |
          set -euo pipefail
          IMAGE_SHA="${REGISTRY}/${REPO}:${GITHUB_SHA}"
          IMAGE_LATEST="${REGISTRY}/${REPO}:latest"

          docker build -f practice-activity-app/Dockerfile -t "$IMAGE_SHA" -t "$IMAGE_LATEST" practice-activity-app
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"